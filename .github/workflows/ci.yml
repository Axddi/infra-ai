name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        cd app/backend
        pip install -r requirements.txt

    - name: Run tests
      run: |
        cd app/backend
        echo "Running tests..."
        # later: pytest

    - name: Success message
      run: echo "CI Passed"